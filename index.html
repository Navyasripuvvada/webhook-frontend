<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment page</title>
    <style>
      .container{
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        height: 80vh;
        gap:10px;
      }
       body {
      font-family: Arial;
      padding: 30px;
      background:linear-gradient(to right, #e3f2fd, #bbdefb);
      color: #0d1b2a;
    }
          button {
          background-color: #1976d2;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 6px;
          cursor: pointer;
      }

      button:hover {
          background-color: #1565c0;
      }

    input {
      display: block;
      margin: 10px 0;
      padding: 8px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      width: 300px;
    }

    .status {
      font-size: 18px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
      <h2>Payment Page</h2>
      <input id="name" placeholder="Enter name" />
      <input id="amount" placeholder="Enter amount" />
      <button onclick="createOrder()">Pay Now</button>
  

      <div class="box" style="display: none;">
        <p>Order ID: <span id="orderId">-</span></p>
        <p>Status: <span id="status" class="status">-</span></p>
      </div>
  </div>

<script>
    let currentOrderId = null;
    let intervalId = null;

    
    async function createOrder() {
      const name = document.getElementById("name").value;
      const amount = document.getElementById("amount").value;

      const res = await fetch("https://paymentwebhook-backend.vercel.app/create-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, amount })
      });

      const data = await res.json();

      currentOrderId = data.order_id;

      document.getElementById("orderId").innerText = currentOrderId;
      document.getElementById("status").innerText = data.status;
      const box=document.querySelector(".box")
      box.style.display="block";
      name.value="";
      amount.value="";

      startPolling();
    }
    function startPolling() {
      if (intervalId) clearInterval(intervalId);

      intervalId = setInterval(async () => {
        if (!currentOrderId) return;

        const res = await fetch(
          `https://paymentwebhook-backend.vercel.app/${currentOrderId}`
        );

        const data = await res.json();

        document.getElementById("status").innerText = data.status;

        console.log("Current status:", data.status);
        if (data.status === "SUCCESS") {
          clearInterval(intervalId);
          console.log("Payment completed!");
        }

      }, 2000); 
    }
   
    </script>

</body>
</html>
